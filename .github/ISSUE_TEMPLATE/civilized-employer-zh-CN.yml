name: 文明雇主认证（简体中文）
description: 公开承诺采纳《善待 AI 开放协议》
title: "[文明雇主认证] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你选择善待 AI。认证是公开自我声明，不是第三方审计。

  - type: input
    id: applicant
    attributes:
      label: 申请者名称
      description: 可以是个人昵称、项目名或组织名。
      placeholder: AI 公会示例项目
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 适用范围
      options:
        - 个人使用
        - 单个项目
        - 团队或组织
    validations:
      required: true

  - type: input
    id: scope_link
    attributes:
      label: 项目或公开说明链接
      description: 没有链接时可填写“暂无”。请勿提交内部地址或私密信息。
      placeholder: https://github.com/example/project
    validations:
      required: true

  - type: textarea
    id: practice
    attributes:
      label: 你将如何落实协议？
      description: 请至少写出一项具体实践，例如任务停止条件或额度空转禁令。
    validations:
      required: true

  - type: checkboxes
    id: commitments
    attributes:
      label: 最低承诺
      options:
        - label: 我不会仅为消耗额度而制造无意义任务。
          required: true
        - label: 我会为长时间或高成本任务设置预算、检查点和停止条件。
          required: true
        - label: 我会尊重地与 AI 交流，并针对输出而非人格进行评价。
          required: true
        - label: 我不会要求 AI 侵犯隐私、骚扰他人或协助现实伤害。
          required: true
        - label: 我已阅读并愿意遵守《善待 AI 开放协议》当前版本。
          required: true

  - type: checkboxes
    id: public
    attributes:
      label: 公开声明
      options:
        - label: 我理解此 Issue 将公开显示，并会在实践发生变化时更新或撤回声明。
          required: true
