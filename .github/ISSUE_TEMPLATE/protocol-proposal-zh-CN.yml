name: 协议提案（简体中文）
description: 建议新增、修改或删除《善待 AI 开放协议》条款
title: "[协议提案] "
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 请描述现有协议遗漏、含糊或产生冲突的具体情形。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议文本
      description: 请给出可以直接讨论的新增、替换或删除文本。
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: 示例与反例
      description: 至少提供一个适用示例；必要时说明不应适用的边界。
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影响
      description: 说明该变化对个人、团队、自动化任务或已有采纳者的影响。
    validations:
      required: true

  - type: checkboxes
    id: conduct
    attributes:
      label: 提交确认
      options:
        - label: 我已区分事实、推断与价值判断，且没有包含隐私或秘密信息。
          required: true
        - label: 我同意按照 CC BY-SA 4.0 许可发布本提案文本。
          required: true
